version: "3.9"

# ── Vision Assistant — Full Stack Compose ─────────────────────────────────────
# Usage:
#   docker compose up --build             (CPU mode)
#   docker compose --profile gpu up       (GPU mode)

services:

  # ── Redis — frame state + Celery broker ──────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vision_net

  # ── Backend API ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile.backend
      target: production
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
      - MIDAS_DEVICE=cpu          # change to "cuda" when using GPU
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - TTS_ENGINE=gtts
      - LOG_FORMAT=json
      - LOG_LEVEL=INFO
    env_file:
      - ../../backend/.env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - vision_net
    volumes:
      - model_cache:/root/.cache   # persist downloaded models across restarts

  # ── GPU variant (activate with --profile gpu) ─────────────────────────────
  backend-gpu:
    extends: backend
    profiles: ["gpu"]
    environment:
      - MIDAS_DEVICE=cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── Celery worker (async heavy tasks) ────────────────────────────────────────
  worker:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile.backend
      target: production
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - MIDAS_DEVICE=cpu
    depends_on:
      - redis
      - backend
    networks:
      - vision_net
    volumes:
      - model_cache:/root/.cache

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - vision_net

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - vision_net

volumes:
  redis_data:
  grafana_data:
  model_cache:

networks:
  vision_net:
    driver: bridge
